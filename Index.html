<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reformas Esperanza · Presupuestos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root{
    --pine:#1E4A39;        /* verde marca */
    --pine-dark:#16382B;
    --pine-soft:#2C5C49;
    --copper:#B26F4A;      /* cobre marca */
    --copper-soft:#C98A63;
    --cream:#F6F3EC;       /* fondo crema */
    --cream-2:#EFE9DD;
    --paper:#FFFFFF;
    --ink:#23302A;
    --muted:#6E7A73;
    --line:#E4DFD3;
    --line-2:#D9D2C2;
    --danger:#9c4a3a;
    --ok:#2f6b4f;
    --radius:14px;
    --shadow:0 1px 2px rgba(30,74,57,.04), 0 8px 28px rgba(30,74,57,.06);
    --shadow-lg:0 18px 50px rgba(30,74,57,.16);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--cream);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
  }
  .serif{font-family:'Fraunces','Georgia','Times New Roman',serif;}
  h1,h2,h3{margin:0;font-weight:600;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;font-size:14px;color:var(--ink)}
  a{color:var(--copper)}

  /* diamond motif from the logo */
  .dia{display:inline-block;width:6px;height:6px;background:var(--copper);transform:rotate(45deg);flex:0 0 auto}

  /* ---------- App shell ---------- */
  .app{display:flex;min-height:100vh}
  .nav{
    width:230px;flex:0 0 230px;background:var(--paper);border-right:1px solid var(--line);
    padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px;
  }
  .brand{display:flex;align-items:center;gap:12px;padding:4px 8px 18px}
  .brand .mono{
    font-family:'Fraunces',serif;font-weight:600;font-size:24px;color:var(--pine);
    line-height:1;letter-spacing:.02em;
  }
  .brand .name{font-size:12px;letter-spacing:.18em;color:var(--copper);text-transform:uppercase;font-weight:600}
  .brand .name b{display:block;color:var(--pine);font-size:14px;letter-spacing:.16em}
  .nav-btn{
    display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;
    color:var(--muted);font-weight:500;font-size:14px;text-align:left;width:100%;transition:.15s;
  }
  .nav-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7}
  .nav-btn:hover{background:var(--cream);color:var(--ink)}
  .nav-btn.active{background:var(--pine);color:#fff}
  .nav-spacer{flex:1}
  .nav-foot{font-size:11px;color:var(--muted);padding:8px;border-top:1px solid var(--line);line-height:1.5}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{
    display:none;align-items:center;justify-content:space-between;padding:12px 16px;
    background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;
  }
  .topbar .mono{font-family:'Fraunces',serif;font-weight:600;font-size:20px;color:var(--pine)}
  .content{padding:30px 36px;max-width:1280px;width:100%;margin:0 auto;flex:1}

  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
  .page-head h1{font-family:'Fraunces',serif;font-size:30px;color:var(--pine);font-weight:600}
  .page-head p{margin:4px 0 0;color:var(--muted);font-size:14px}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;font-weight:600;font-size:14px;transition:.15s;border:1px solid transparent;white-space:nowrap}
  .btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.9}
  .btn-primary{background:var(--pine);color:#fff}
  .btn-primary:hover{background:var(--pine-dark)}
  .btn-copper{background:var(--copper);color:#fff}
  .btn-copper:hover{background:#9c5d3c}
  .btn-ghost{background:var(--paper);border-color:var(--line-2);color:var(--ink)}
  .btn-ghost:hover{border-color:var(--pine);color:var(--pine)}
  .btn-quiet{background:transparent;color:var(--muted);padding:8px 10px}
  .btn-quiet:hover{color:var(--ink);background:var(--cream-2)}
  .btn-sm{padding:7px 11px;font-size:13px}
  .btn-danger{color:var(--danger)}
  .btn-danger:hover{background:#f6e9e6}

  /* cards / list */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .bud-card{padding:18px;display:flex;flex-direction:column;gap:12px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .bud-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
  .bud-card .accent{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--copper)}
  .bud-card.aprobado .accent{background:var(--pine)}
  .bud-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .bud-num{font-size:12px;letter-spacing:.06em;color:var(--muted);font-weight:600}
  .bud-cli{font-family:'Fraunces',serif;font-size:18px;color:var(--pine);font-weight:600;margin-top:2px;line-height:1.2}
  .bud-tot{font-size:20px;font-weight:700;color:var(--ink)}
  .bud-meta{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--muted)}
  .pill{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 9px;border-radius:99px}
  .pill.borrador{background:#f3ede0;color:#9b7a3e}
  .pill.aprobado{background:#e2efe8;color:var(--ok)}
  .pill.caducado{background:#f6e7e3;color:var(--danger)}
  .bud-actions{display:flex;gap:4px;border-top:1px solid var(--line);padding-top:10px;margin-top:2px}

  .empty{text-align:center;padding:70px 20px;color:var(--muted)}
  .empty .dia{margin:0 auto 16px;width:14px;height:14px;display:block}
  .empty h3{font-family:'Fraunces',serif;color:var(--pine);font-size:22px;margin-bottom:6px}

  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
  .search{flex:1;min-width:200px;display:flex;align-items:center;gap:9px;background:var(--paper);border:1px solid var(--line-2);border-radius:10px;padding:9px 13px}
  .search input{border:none;outline:none;width:100%;background:none}
  .search svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:1.8}

  /* ---------- Editor ---------- */
  .editor{display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:start}
  @media(max-width:1100px){.editor{grid-template-columns:1fr}}
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .panel-h{display:flex;align-items:center;gap:9px;padding:15px 18px;border-bottom:1px solid var(--line);font-weight:600;color:var(--pine);font-size:14px;letter-spacing:.02em}
  .panel-h .dia{width:7px;height:7px}
  .panel-b{padding:18px}
  .section-stack{display:flex;flex-direction:column;gap:18px}

  .field{margin-bottom:13px}
  .field:last-child{margin-bottom:0}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:.02em}
  .field input,.field textarea,.field select{
    width:100%;padding:10px 12px;border:1px solid var(--line-2);border-radius:9px;background:#fcfbf8;outline:none;transition:.15s;
  }
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--pine);background:#fff;box-shadow:0 0 0 3px rgba(30,74,57,.08)}
  .field textarea{resize:vertical;min-height:72px;line-height:1.5}
  .row{display:flex;gap:12px}
  .row>*{flex:1}
  .hint{font-size:11.5px;color:var(--muted);margin-top:5px}

  /* line items */
  .line{border:1px solid var(--line);border-radius:11px;padding:13px;margin-bottom:12px;background:#fcfbf8;position:relative}
  .line-top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .line-badge{width:24px;height:24px;border-radius:7px;background:var(--cream-2);color:var(--copper);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .line-title{flex:1;font-weight:600;font-size:13.5px;border:none;background:none;outline:none;color:var(--ink)}
  .line-grid{display:grid;grid-template-columns:1.1fr .8fr .8fr 1fr;gap:9px;align-items:end}
  @media(max-width:560px){.line-grid{grid-template-columns:1fr 1fr}}
  .line .mini label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px;font-weight:600}
  .line .mini input,.line .mini select{width:100%;padding:8px 9px;border:1px solid var(--line-2);border-radius:8px;background:#fff;outline:none}
  .line-total{font-weight:700;color:var(--pine);align-self:end;text-align:right;padding-bottom:8px;font-size:14px}
  .line-del{position:absolute;top:10px;right:10px}
  .line-del svg{width:15px;height:15px;stroke:var(--muted)}
  .line-del:hover svg{stroke:var(--danger)}
  .add-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:4px}

  /* componentes de una partida */
  .line.compuesta{padding-bottom:11px}
  .comp-list{display:flex;flex-direction:column;gap:6px;margin:4px 0 10px}
  .comp-row{display:flex;align-items:center;gap:8px}
  .comp-row.off{opacity:.45}
  .comp-row input[type=checkbox]{width:17px;height:17px;flex:0 0 auto;accent-color:var(--pine);cursor:pointer}
  .comp-row .cn{flex:1;min-width:0;padding:8px 9px;border:1px solid var(--line-2);border-radius:8px;background:#fff;outline:none}
  .comp-row .cn:focus{border-color:var(--pine)}
  .comp-row .cp{width:74px;flex:0 0 auto;padding:8px 9px;border:1px solid var(--line-2);border-radius:8px;background:#fff;outline:none;text-align:right}
  .comp-row .cp:focus{border-color:var(--pine)}
  .comp-row .ce{color:var(--muted);font-size:13px;margin-left:-3px}
  .comp-del{flex:0 0 auto;color:var(--muted);font-size:14px;padding:4px 7px;border-radius:7px}
  .comp-del:hover{color:var(--danger);background:#f6e9e6}
  .comp-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border-top:1px dashed var(--line);padding-top:9px}
  .comp-sub{font-size:13px;color:var(--muted)}
  .comp-sub b{color:var(--pine);font-size:15px}

  .quickadd{display:flex;gap:8px;margin-bottom:14px}
  .quickadd select{flex:1}

  /* summary sticky */
  .summary{position:sticky;bottom:0}
  .sum-rows{padding:4px 0}
  .sum-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:var(--muted)}
  .sum-row span:last-child{color:var(--ink);font-weight:600}
  .sum-total{display:flex;justify-content:space-between;align-items:baseline;border-top:2px solid var(--pine);margin-top:8px;padding-top:12px}
  .sum-total .lbl{font-family:'Fraunces',serif;font-size:17px;color:var(--pine);font-weight:600}
  .sum-total .val{font-size:26px;font-weight:700;color:var(--pine)}
  .editor-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  .editor-actions .btn{flex:1;justify-content:center;min-width:140px}

  .seg{display:inline-flex;background:var(--cream-2);border-radius:9px;padding:3px;gap:2px}
  .seg button{padding:7px 13px;border-radius:7px;font-size:13px;font-weight:600;color:var(--muted)}
  .seg button.on{background:#fff;color:var(--pine);box-shadow:var(--shadow)}
  .precio-modo{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 16px;margin-bottom:20px}
  .precio-modo .pm-lbl{font-weight:600;color:var(--pine);font-size:13.5px}
  @media(max-width:560px){.precio-modo .seg{width:100%}.precio-modo .seg button{flex:1}}

  .pay-line{display:grid;grid-template-columns:1fr 70px 100px 30px;gap:8px;align-items:center;margin-bottom:7px}
  .pay-line input{padding:8px 9px;border:1px solid var(--line-2);border-radius:8px;background:#fff;outline:none;width:100%}
  .pay-line .amt{font-weight:700;color:var(--pine);text-align:right;font-size:13px}
  .pay-warn{font-size:12px;font-weight:600;color:var(--danger);margin-top:4px}
  .pay-warn.ok{color:var(--ok)}

  .clause{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
  .clause textarea{flex:1;min-height:40px}
  .chk{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink);margin-bottom:6px}

  /* ---------- Document / preview ---------- */
  .doc-wrap{display:flex;flex-direction:column;align-items:center;gap:18px}
  .doc-bar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;max-width:820px}
  .doc{
    background:#fff;width:100%;max-width:820px;border-radius:6px;box-shadow:var(--shadow-lg);
    padding:54px 56px;color:#27302b;position:relative;
  }
  .doc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:24px}
  .doc-logo img{max-height:108px;max-width:300px;object-fit:contain;display:block}
  .doc-logo .wm-mono{font-family:'Fraunces',serif;font-size:40px;font-weight:600;color:var(--pine);line-height:.9}
  .doc-logo .wm-r{font-size:11px;letter-spacing:.34em;color:var(--copper);font-weight:600;margin-top:6px}
  .doc-logo .wm-e{font-size:17px;letter-spacing:.30em;color:var(--pine);font-weight:600}
  .doc-title{text-align:right}
  .doc-title .t{font-family:'Fraunces',serif;font-size:30px;color:var(--pine);font-weight:600;letter-spacing:.01em}
  .doc-title .meta{margin-top:10px;font-size:12.5px;color:#5c655f;line-height:1.7}
  .doc-title .meta b{color:#27302b}
  .rule{display:flex;align-items:center;gap:10px;margin:22px 0}
  .rule .l{height:1px;background:var(--copper);flex:1;opacity:.55}
  .rule .dia{width:8px;height:8px}
  .doc-parties{display:flex;justify-content:space-between;gap:30px;font-size:12.5px;line-height:1.65}
  .doc-parties .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--copper);font-weight:700;margin-bottom:5px}
  .doc-parties .who{font-weight:700;color:#27302b}
  .doc-parties .blk{max-width:48%}
  .doc-parties .blk.right{text-align:right}

  table.items{width:100%;border-collapse:collapse;margin-top:26px}
  table.items th{
    font-size:10px;letter-spacing:.10em;text-transform:uppercase;color:var(--pine);font-weight:700;
    text-align:left;padding:0 10px 9px;border-bottom:1.5px solid var(--pine);
  }
  table.items th.num,table.items td.num{text-align:right;white-space:nowrap}
  table.items td{padding:13px 10px;border-bottom:1px solid var(--line);vertical-align:top;font-size:12.5px}
  table.items .pno{color:var(--copper);font-weight:700;width:34px}
  table.items .desc .h{font-weight:700;color:#27302b;margin-bottom:4px}
  table.items .desc ul{margin:0;padding:0;list-style:none}
  table.items .desc li{position:relative;padding-left:15px;margin:2px 0;color:#4a544e;line-height:1.5}
  table.items .desc li::before{content:"";position:absolute;left:0;top:6px;width:5px;height:5px;background:var(--copper);transform:rotate(45deg)}
  table.items td.unit,table.items td.tot{font-weight:600;color:#27302b}
  table.items td.tot{color:var(--pine);font-weight:700}
  table.items .subitems{width:100%;border-collapse:collapse;margin-top:3px}
  table.items .subitems td{padding:3px 0;border:none;border-bottom:1px dashed var(--line);font-size:12px;color:#4a544e}
  table.items .subitems td:last-child{text-align:right;white-space:nowrap;font-weight:700;color:var(--pine);width:92px;padding-left:10px}

  .doc-bottom{display:flex;justify-content:space-between;gap:30px;margin-top:26px;align-items:flex-start}
  .pay-box{flex:1;font-size:12px;color:#4a544e}
  .pay-box .lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--copper);font-weight:700;margin-bottom:8px}
  .pay-box table{width:100%;border-collapse:collapse}
  .pay-box td{padding:4px 0;border-bottom:1px dashed var(--line)}
  .pay-box td:last-child{text-align:right;font-weight:700;color:var(--pine)}
  .totals{width:265px;flex:0 0 auto}
  .totals .tr{display:flex;justify-content:space-between;padding:7px 0;font-size:13px;color:#5c655f}
  .totals .tr b{color:#27302b;font-weight:600}
  .totals .grand{display:flex;justify-content:space-between;align-items:baseline;background:var(--pine);color:#fff;border-radius:8px;padding:13px 16px;margin-top:8px}
  .totals .grand .gl{font-family:'Fraunces',serif;font-size:14px;letter-spacing:.04em}
  .totals .grand .gv{font-size:22px;font-weight:700}

  .doc-notes{margin-top:30px;border-top:1px solid var(--line);padding-top:16px;font-size:10.8px;color:#6b746e;line-height:1.7;columns:2;column-gap:34px}
  .doc-notes div{break-inside:avoid;margin-bottom:3px}
  .doc-foot{margin-top:30px;text-align:center}
  .doc-foot .thanks{font-family:'Fraunces',serif;font-size:16px;color:var(--pine);letter-spacing:.04em;display:flex;align-items:center;justify-content:center;gap:12px}
  .doc-foot .co{margin-top:14px;font-size:10.5px;color:#8a918b;line-height:1.6}

  /* settings */
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
  @media(max-width:900px){.settings-grid{grid-template-columns:1fr}}
  .logo-drop{border:2px dashed var(--line-2);border-radius:12px;padding:22px;text-align:center;color:var(--muted);cursor:pointer;transition:.15s;background:#fcfbf8}
  .logo-drop:hover{border-color:var(--copper);color:var(--copper)}
  .logo-prev{max-height:120px;max-width:100%;margin:0 auto 10px;display:block}

  /* toast */
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--pine-dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;z-index:200;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .dia{background:var(--copper-soft)}

  /* confirmación propia (los confirm() nativos se bloquean en algunas vistas) */
  .modal-back{position:fixed;inset:0;background:rgba(22,56,43,.38);display:none;align-items:center;justify-content:center;z-index:300;padding:24px}
  .modal-back.show{display:flex}
  .modal{background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);max-width:380px;width:100%;padding:24px}
  .modal-msg{font-size:15px;color:var(--ink);line-height:1.5;margin-bottom:20px}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end}
  .modal-actions .btn{min-width:104px;justify-content:center}

  .hidden{display:none!important}

  /* mobile */
  @media(max-width:820px){
    .nav{display:none}
    .topbar{display:flex}
    .content{padding:18px 16px 90px}
    .doc{padding:30px 26px}
    .doc-head{flex-direction:column;gap:14px}
    .doc-title{text-align:left}
    .doc-parties{flex-direction:column;gap:16px}
    .doc-parties .blk{max-width:100%}
    .doc-parties .blk.right{text-align:left}
    .doc-bottom{flex-direction:column}
    .totals{width:100%}
    .doc-notes{columns:1}
    .page-head h1{font-size:24px}
    /* mobile bottom nav */
    .mnav{display:flex}
  }
  .mnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--paper);border-top:1px solid var(--line);justify-content:space-around;padding:7px 4px 9px;z-index:50}
  .mnav button{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted);font-weight:600;padding:4px 8px}
  .mnav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7}
  .mnav button.active{color:var(--pine)}

  @media print{
    .nav,.topbar,.mnav,.doc-bar,.no-print{display:none!important}
    body{background:#fff}
    .content{padding:0}
    .doc{box-shadow:none;max-width:none;width:auto;padding:0;border-radius:0}
    .doc-wrap{gap:0}
  }

// las líneas antiguas (con precio único) siguen funcionando como tipo 'simple'
(state.budgets||[]).forEach(b=>(b.lineas||[]).forEach(l=>{ if(!l.tipo) l.tipo = l.componentes?'compuesta':'simple'; }));
DB.save();

let current = null;       // presupuesto en edición
let docMode = false;      // vista previa activa
let listQuery = '';

/* ---------- utilidades ---------- */
function uid(){ return 'id'+Math.random().toString(36).slice(2,9); }
const eur = new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'});
function money(n){ return eur.format(isFinite(n)?n:0); }
function num(v){ if(typeof v==='number')return v; if(!v)return 0; return parseFloat(String(v).replace(/\./g,'').replace(',','.'))||0; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fechaCorta(iso){ const d=new Date(iso); return d.toLocaleDateString('es-ES'); }
function toast(msg){ const t=document.getElementById('toast'); document.getElementById('toastMsg').textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }
let _onConfirm=null;
function confirmAction(msg, onYes, okLabel){
  _onConfirm=onYes;
  document.getElementById('modalMsg').textContent=msg;
  document.getElementById('modalOk').textContent=okLabel||'Aceptar';
  document.getElementById('modalBack').classList.add('show');
}
function _modalClose(){ document.getElementById('modalBack').classList.remove('show'); _onConfirm=null; }

/* ---------- cálculos ---------- */
function lineTotal(l){
  if(l.tipo==='compuesta') return (l.componentes||[]).filter(c=>c.incluido!==false).reduce((s,c)=>s+num(c.precio),0);
  return num(l.precio)*num(l.cantidad||1);
}
function calc(b){
  const subtotal = (b.lineas||[]).reduce((s,l)=>s+lineTotal(l),0);
  const desc = subtotal*(num(b.descuento)/100);
  const base = subtotal-desc;
  const iva = base*(num(b.iva)/100);
  const total = base+iva;
  return {subtotal,desc,base,iva,total};
}

/* ---------- navegación ---------- */
function setActive(view){
  document.querySelectorAll('.nav-btn,.mnav button').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===view);
  });
}
function go(view){
  docMode=false;
  setActive(view);
  if(view==='list') renderList();
  else if(view==='catalog') renderCatalog();
  else if(view==='settings') renderSettings();
  else if(view==='editor') renderEditor();
  window.scrollTo(0,0);
}

/* ============================================================
   LISTA DE PRESUPUESTOS
============================================================ */
function budgetStatus(b){
  if(b.estado==='aprobado') return 'aprobado';
  const venc = new Date(b.fecha); venc.setDate(venc.getDate()+ (b.validezDias||30));
  if(new Date()>venc) return 'caducado';
  return 'borrador';
}
function renderList(){
  setActive('list');
  const list = state.budgets.slice().sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  const q=listQuery.toLowerCase();
  const filtered = list.filter(b=> !q || (b.cliente.nombre||'').toLowerCase().includes(q) || (b.numero||'').toLowerCase().includes(q) || (b.cliente.poblacion||'').toLowerCase().includes(q));

  let html = `<div class="page-head">
      <div><h1>Presupuestos</h1><p>${state.budgets.length} en total · se guardan en este dispositivo</p></div>
      <button class="btn btn-primary" onclick="newBudget()"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Nuevo presupuesto</button>

  html += `<div class="toolbar"><div class="search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
      <input placeholder="Buscar por cliente, número o población" value="${esc(listQuery)}" oninput="listQuery=this.value;renderList();this.focus();">
    </div></div>`;

  if(!filtered.length){
    html += `<div class="empty"><span class="dia"></span>
      <h3>${state.budgets.length? 'Sin resultados':'Aún no hay presupuestos'}</h3>
      <p>${state.budgets.length? 'Prueba con otra búsqueda.':'Crea el primero y se generará el PDF al aprobarlo.'}</p>
      ${state.budgets.length?'':'<br><button class="btn btn-primary" onclick="newBudget()">Crear el primero</button>'}
    </div>`;
    document.getElementById('content').innerHTML=html;
    afterListRender();
    return;
  }

  html += '<div class="grid">';
  filtered.forEach(b=>{
    const st=budgetStatus(b); const t=calc(b);
    html += `<div class="card bud-card ${st==='aprobado'?'aprobado':''}" onclick="openBudget('${b.id}')">
      <span class="accent"></span>
      <div class="bud-top">
        <div>
          <div class="bud-num">${esc(b.numero||'—')}</div>
          <div class="bud-cli">${esc(b.cliente.nombre||'Sin nombre')}</div>
        </div>
        <span class="pill ${st}">${st}</span>

      <div class="bud-tot">${money(t.total)}</div>

      <div class="bud-actions" onclick="event.stopPropagation()">

      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('content').innerHTML=html;
  afterListRender();

function afterListRender(){ const s=document.querySelector('.search input'); if(s && listQuery){ s.selectionStart=s.selectionEnd=s.value.length; } }

/* ============================================================
   CREAR / ABRIR / DUPLICAR / ELIMINAR
============================================================ */
function nextNumber(){
  const s=state.settings; const y=new Date().getFullYear();
  if(s.numAnio!==y){ s.numAnio=y; s.numSiguiente=1; }
  const n = `${y}-${String(s.numSiguiente).padStart(3,'0')}`;
  return n;
}
function newBudget(){
  const s=state.settings;
  current = {
    id:uid(),
    numero: nextNumber(),
    fecha: new Date().toISOString(),
    validezDias: s.validezDias,
    estado:'borrador',
    cliente:{nombre:'',direccion:'',cp:'',poblacion:'',idCliente:'',tel:'',email:''},
    lineas:[],
    iva: s.ivaDefault,
    descuento:0,
    desglose:'partida',
    pagoTramos: JSON.parse(JSON.stringify(s.pagoPresets[0].tramos)),
    pagoNota: s.pagoNota,
    clausulas: s.clausulas.slice(),
    notas:'',
    _nuevo:true,
    createdAt:Date.now(), updatedAt:Date.now()
  };
  renderEditor();
}
function openBudget(id){ current = state.budgets.find(b=>b.id===id); if(current){ current._nuevo=false; renderEditor(); } }
function persistCurrent(){
  if(!current) return;
  current.updatedAt=Date.now();
  const i=state.budgets.findIndex(b=>b.id===current.id);
  if(i>=0) state.budgets[i]=current; else state.budgets.unshift(current);
  // si era nuevo y se guarda, consumimos el número de la secuencia
  if(current._nuevo){
    current._nuevo=false;
    const s=state.settings, y=new Date().getFullYear();
    if(current.numero===`${y}-${String(s.numSiguiente).padStart(3,'0')}`){ s.numSiguiente++; }
  }
  DB.save();
}
function duplicate(id){
  const b=state.budgets.find(x=>x.id===id); if(!b)return;
  const copy=JSON.parse(JSON.stringify(b));
  copy.id=uid(); copy.numero=nextNumber(); copy.fecha=new Date().toISOString();
  copy.estado='borrador'; copy._nuevo=true; copy.createdAt=Date.now(); copy.updatedAt=Date.now();
  current=copy; renderEditor(); toast('Copia creada · ajústala y guárdala');
}
function removeBudget(id){
  confirmAction('¿Eliminar este presupuesto? No se puede deshacer.', ()=>{
    state.budgets=state.budgets.filter(b=>b.id!==id); DB.save(); renderList(); toast('Presupuesto eliminado');
  }, 'Eliminar');
}

function field(label,val,oninput,opts={}){
  const tag=opts.textarea?'textarea':'input';

  const ph=opts.ph?`placeholder="${esc(opts.ph)}"`:'';
  if(opts.textarea) return `<div class="field"><label>${label}</label><textarea ${ph} oninput="${oninput}">${esc(val||'')}</textarea>${opts.hint?`<div class="hint">${opts.hint}</div>`:''}</div>`;
  return `<div class="field"><label>${label}</label><input ${type} ${ph} value="${esc(val||'')}" oninput="${oninput}">${opts.hint?`<div class="hint">${opts.hint}</div>`:''}</div>`;
}

/* handlers editor */
let _saveTimer=null;
function scheduleSave(){ persistCurrent(); }
function upCli(k,v){ current.cliente[k]=v; persistCurrent(); }
function upLine(i,k,v){ current.lineas[i][k]=v; persistCurrent();
  if(k==='precio'||k==='cantidad'){ recalcUI(); } }
function addLine(){ current.lineas.push({id:uid(),tipo:'simple',titulo:'',descripcion:'',cantidad:1,unidad:'ud',precio:''}); persistCurrent(); renderEditor(); }
function delLine(i){ current.lineas.splice(i,1); persistCurrent(); renderEditor(); }
function addFromCatalog(){
  const sel=document.getElementById('catSel'); if(!sel||!sel.value)return;
  const c=state.catalog.find(x=>x.id===sel.value); if(!c)return;
  const componentes=(c.componentes||[]).map(x=>({id:uid(),nombre:x.nombre,precio:x.precio,incluido:true}));
  current.lineas.push({id:uid(),tipo:'compuesta',titulo:c.nombre,componentes});
  persistCurrent(); renderEditor(); toast('Partida añadida · marca y ajusta sus componentes');
}
/* componentes de una partida compuesta */
function toggleComp(i,j){ const c=current.lineas[i].componentes[j]; c.incluido = (c.incluido===false); persistCurrent(); renderEditor(); }
function upComp(i,j,k,v){ current.lineas[i].componentes[j][k]=v; persistCurrent(); if(k==='precio')recalcUI(); }
function addComp(i){ current.lineas[i].componentes.push({id:uid(),nombre:'',precio:'',incluido:true}); persistCurrent(); renderEditor(); }
function delComp(i,j){ current.lineas[i].componentes.splice(j,1); persistCurrent(); renderEditor(); }
function applyPreset(i){ if(i==='')return; current.pagoTramos=JSON.parse(JSON.stringify(state.settings.pagoPresets[i].tramos)); persistCurrent(); renderEditor(); }
function upPay(i,k,v){ current.pagoTramos[i][k]= k==='p'?(parseFloat(v)||0):v; persistCurrent(); if(k==='p')recalcUI(); }
function addPay(){ current.pagoTramos.push({l:'',p:0}); persistCurrent(); renderEditor(); }
function delPay(i){ current.pagoTramos.splice(i,1); persistCurrent(); renderEditor(); }
function upClause(i,v){ current.clausulas[i]=v; persistCurrent(); }
function addClause(){ current.clausulas.push(''); persistCurrent(); renderEditor(); }
function delClause(i){ current.clausulas.splice(i,1); persistCurrent(); renderEditor(); }
function setDesglose(m){ current.desglose=m; persistCurrent(); renderEditor(); }

/* Actualiza los totales en pantalla SIN volver a dibujar los campos
   (así el teclado del móvil no se cierra al escribir un precio). */
function recalcUI(){
  if(!current) return;
  const t=calc(current);
  const set=(id,v)=>{const e=document.getElementById(id); if(e) e.textContent=v;};
  document.querySelectorAll('[data-linesub]').forEach(el=>{
    const l=current.lineas.find(x=>x.id===el.getAttribute('data-linesub'));
    if(l) el.textContent=money(lineTotal(l));
  });
  set('liveSub',money(t.subtotal));
  set('liveBase',money(t.base));
  set('liveIva',money(t.iva));
  set('liveTotal',money(t.total));
  const dr=document.getElementById('liveDescRow');
  if(dr){ dr.style.display=t.desc>0?'flex':'none'; set('liveDescPct',(num(current.descuento)||0)+'%'); set('liveDescAmt','− '+money(t.desc)); }
  document.querySelectorAll('[data-payamt]').forEach(el=>{
    const tr=current.pagoTramos[+el.getAttribute('data-payamt')];
    if(tr) el.textContent=money(t.total*num(tr.p)/100);
  });
  const sumP=(current.pagoTramos||[]).reduce((s,x)=>s+num(x.p),0);
  const pw=document.getElementById('payWarn');
  if(pw){ pw.className='pay-warn'+(sumP===100?' ok':''); pw.textContent=sumP===100?'✓ Suma 100%':'Los tramos suman '+sumP+'% (deberían sumar 100%)'; }
}

function approve(){

  current.estado='aprobado'; persistCurrent();
  docMode=true; renderDoc();

}

function descToHtml(l){
  let out='';
  if(l.titulo) out+=`<div class="h">${esc(l.titulo)}</div>`;
  if(l.tipo==='compuesta'){
    const inc=(l.componentes||[]).filter(c=>c.incluido!==false && (c.nombre||'').trim());
    if(inc.length) out+='<ul>'+inc.map(c=>`<li>${esc(c.nombre)}</li>`).join('')+'</ul>';
    return out || '<div style="color:#9aa39d">—</div>';
  }
  const lines=(l.descripcion||'').split('\n').map(x=>x.trim()).filter(Boolean);
  const bullets=lines.filter(x=>x.startsWith('- '));
  const plain=lines.filter(x=>!x.startsWith('- '));
  plain.forEach(p=> out+=`<div>${esc(p)}</div>`);
  if(bullets.length){ out+='<ul>'+bullets.map(x=>`<li>${esc(x.slice(2))}</li>`).join('')+'</ul>'; }
  return out || '<div style="color:#9aa39d">—</div>';
}

    <button class="btn btn-ghost" onclick="sendWhatsApp()" style="color:#1f7a4d"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-12.3 7.4L3 21l2.2-5.6A8.4 8.4 0 1 1 21 11.5z"/></svg> WhatsApp</button>
    <button class="btn btn-ghost" onclick="sendEmail()"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg> Email</button>
    <button class="btn btn-quiet" onclick="window.print()"><svg viewBox="0 0 24 24"><path d="M6 9V3h12v6M6 18H4v-7h16v7h-2M8 14h8v7H8z"/></svg> Imprimir</button>

      <div class="doc-parties">

          <div>${esc(s.empresa.direccion)}</div>

function pdfFilename(){
  return `Presupuesto_${(current.numero||'').replace(/[^\w-]/g,'')}_${(current.cliente.nombre||'cliente').replace(/[^\w]+/g,'-')}.pdf`;
}
function pdfOpts(name){
  return {margin:[8,8,8,8],filename:name,image:{type:'jpeg',quality:0.98},
    html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy']}};
}
function downloadPDF(silent){
  const el=document.getElementById('doc'); if(!el)return;
  const name=pdfFilename();
  if(typeof html2pdf==='undefined'){
    if(!silent) toast('Sin conexión: usa «Imprimir» → Guardar como PDF');
    window.print(); return;
  }
  if(!silent) toast('Generando PDF…');
  html2pdf().set(pdfOpts(name)).from(el).save().then(()=>toast('PDF descargado')).catch(()=>{ window.print(); });
}
async function makePdfBlob(){
  const el=document.getElementById('doc'); if(!el||typeof html2pdf==='undefined')return null;
  try{ return await html2pdf().set(pdfOpts(pdfFilename())).from(el).outputPdf('blob'); }
  catch(e){ return null; }
}
function dl(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); }
function clientMsg(){
  const t=calc(current);
  const nom=(current.cliente.nombre||'').split(/[ ·\-]/)[0]||'';
  return `Hola ${nom}, te envío el presupuesto ${current.numero} de Reformas Esperanza por un total de ${money(t.total)} (IVA incluido). Cualquier duda, aquí estoy. ¡Gracias!`;
}
// Compartir: en móvil abre la hoja del sistema con el PDF YA adjunto (WhatsApp, correo, etc.)
async function sharePDF(){
  toast('Preparando PDF…');
  const blob=await makePdfBlob(); const name=pdfFilename();
  if(blob && navigator.canShare){
    const file=new File([blob],name,{type:'application/pdf'});
    if(navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], title:'Presupuesto '+current.numero, text:clientMsg()}); return; }
      catch(e){ if(e&&e.name==='AbortError') return; }
    }
  }
  if(blob){ dl(blob,name); toast('PDF descargado · adjúntalo donde quieras'); }
  else { window.print(); }
}
function waNumber(){ let d=(current.cliente.tel||'').replace(/\D/g,''); if(!d)return ''; if(d.length===9)d='34'+d; return d; }
async function sendWhatsApp(){
  const blob=await makePdfBlob(); const name=pdfFilename();
  if(blob){
    const file=blob && navigator.canShare ? new File([blob],name,{type:'application/pdf'}) : null;
    if(file && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], text:clientMsg(), title:'Presupuesto'}); return; }
      catch(e){ if(e&&e.name==='AbortError') return; }
    }
    dl(blob,name);
  }
  const num=waNumber();
  toast(blob?'PDF descargado · adjúntalo en el chat':'Abriendo WhatsApp…');
  window.open('https://wa.me/'+num+'?text='+encodeURIComponent(clientMsg()),'_blank');
}
async function sendEmail(){
  const blob=await makePdfBlob(); const name=pdfFilename();
  if(blob){
    const file=navigator.canShare ? new File([blob],name,{type:'application/pdf'}) : null;
    if(file && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], text:clientMsg(), title:'Presupuesto'}); return; }
      catch(e){ if(e&&e.name==='AbortError') return; }
    }
    dl(blob,name);
  }
  const to=current.cliente.email||'';
  const subj='Presupuesto '+current.numero+' · Reformas Esperanza';
  const body=clientMsg()+'\n\n(Te adjunto el PDF del presupuesto.)';
  toast(blob?'PDF descargado · adjúntalo al correo':'Abriendo correo…');
  window.location.href='mailto:'+encodeURIComponent(to)+'?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body);
}

        <input class="cp" value="${esc(x.precio??'')}" oninput="state.catalog[${i}].componentes[${j}].precio=num(this.value);DB.save()" placeholder="0"><span class="ce">€</span>

          <span class="comp-sub">${sub>0?'Total guardado: <b>'+money(sub)+'</b>':'<span style="color:#9aa39d">Precios en blanco · se ponen en cada presupuesto</span>'}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML=`
    <div class="page-head">
      <div><h1>Catálogo de partidas</h1><p>El menú de conceptos que sueles hacer, para no olvidarte de nada. El precio se pone en cada presupuesto (cada obra es distinta): aquí déjalos en blanco o guarda los tuyos habituales como punto de partida.</p></div>
      <button class="btn btn-primary" onclick="addCat()"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Nueva categoría</button>
    </div>
    ${rows || '<div class="empty"><span class="dia"></span><h3>Catálogo vacío</h3><p>Crea tus categorías habituales para reutilizarlas.</p></div>'}`;
}
function addCat(){ state.catalog.unshift({id:uid(),nombre:'Nueva categoría',componentes:[]}); DB.save(); renderCatalog(); }
function delCat(i){ confirmAction('¿Eliminar esta categoría del catálogo?', ()=>{ state.catalog.splice(i,1); DB.save(); renderCatalog(); }, 'Eliminar'); }
function addCatComp(i){ state.catalog[i].componentes.push({id:uid(),nombre:'',precio:0}); DB.save(); renderCatalog(); }
function delCatComp(i,j){ state.catalog[i].componentes.splice(j,1); DB.save(); renderCatalog(); }

function uploadLogo(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ state.settings.logo=r.result; DB.save(); applyBrand(); renderSettings(); toast('Logo actualizado'); };
  r.readAsDataURL(f);
}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`copia-presupuestos-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); toast('Copia exportada');
}
function importData(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d.budgets&&d.settings){ confirmAction('Esto reemplazará los datos actuales por los de la copia. ¿Continuar?', ()=>{ state=d; state.settings=Object.assign({},DEFAULT_SETTINGS,state.settings); DB.save(); applyBrand(); renderSettings(); toast('Copia importada'); }, 'Importar'); } else toast('Archivo no válido'); }catch(err){ toast('No se pudo leer el archivo'); } };
  r.readAsText(f);
}
